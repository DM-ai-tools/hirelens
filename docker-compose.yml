version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hirelens
      POSTGRES_PASSWORD: hirelens
      POSTGRES_DB: hirelens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hirelens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hirelens:hirelens@postgres:5432/hirelens?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: hirelens-docker-secret
      USE_MOCK_AI: "true"
      UPLOAD_DIR: /app/uploads
      REPORT_DIR: /app/reports
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  reports_data:
